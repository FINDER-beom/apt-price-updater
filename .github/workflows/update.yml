name: GitHub Data Updater

on:
  schedule:
    - cron: '0 17 * * *' # 매일 새벽 2시 실행
  workflow_dispatch:

permissions:
  contents: write # 깃허브에 파일을 쓸 수 있는 권한 부여

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: python scraper.py
      
      - name: 깃허브에 데이터 파일 자동 덮어쓰기
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add market_data.json
          git commit -m "일일 시세 데이터 업데이트" || exit 0
          git push
